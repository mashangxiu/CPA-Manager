name: Build Panel

on:
  push:
    tags:
      - 'v*'

jobs:
  build-panel:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build management.html
        run: npm run build
        env:
          VERSION: ${{ github.ref_name }}

      - name: Rename output
        run: mv dist/index.html dist/management.html

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/management.html
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
